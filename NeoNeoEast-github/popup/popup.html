<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>NeoNeoEast 学习面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-root">
      <header class="popup-header">
        <div class="popup-title">NeoNeo<span class="brand-accent">East</span></div>
        <div class="popup-subtitle">中文阅读中的外语生词助手</div>
      </header>

      <section class="popup-review" id="review-section" style="display:none;">
        <div class="review-head">
          <span class="review-title">📖 待复习</span>
          <span class="review-progress" id="review-progress"></span>
        </div>
        <div class="review-card" id="review-card"></div>
        <div class="review-buttons">
          <button class="review-btn review-btn-forget" id="btn-forget">✗ 忘了</button>
          <button class="review-btn review-btn-remember" id="btn-remember">✓ 记得</button>
        </div>
      </section>
      <div class="review-empty" id="review-empty" style="display:none;">今天没有待复习的词，去阅读遇到新词吧 🎉</div>


      <section class="popup-settings">
        <div class="setting-row setting-master">
          <span class="setting-label">启用替换</span>
          <label class="switch">
            <input type="checkbox" id="toggle-enabled" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-title">学习目标语言（同一时间只能学一种）</div>
        <div class="lang-switch">
          <label class="lang-opt"><input type="radio" name="targetLang" value="en" id="lang-en" /> <span>🇬🇧 英语</span></label>
          <label class="lang-opt"><input type="radio" name="targetLang" value="ja" id="lang-ja" /> <span>🇯🇵 日语</span></label>
        </div>

        <div class="setting-title">词库层级（可多选，层层递进）</div>
        <div id="levels-en" class="level-group">
          <label class="level-row"><input type="checkbox" id="lv-gaokao" /> <span>高考词汇</span></label>
          <label class="level-row"><input type="checkbox" id="lv-cet4" /> <span>四级词汇</span></label>
          <label class="level-row"><input type="checkbox" id="lv-cet6" /> <span>六级词汇</span></label>
          <label class="level-row"><input type="checkbox" id="lv-kaoyan" /> <span>考研词汇</span></label>
          <label class="level-row"><input type="checkbox" id="lv-toefl" /> <span>托福词汇</span></label>
          <label class="level-row"><input type="checkbox" id="lv-ielts" /> <span>雅思词汇</span></label>
          <label class="level-row"><input type="checkbox" id="lv-gre" /> <span>GRE 词汇</span></label>
        </div>
        <div id="levels-ja" class="level-group" style="display:none;">
          <label class="level-row"><input type="checkbox" id="lv-jlpt_n5" /> <span>N5(入门)</span></label>
          <label class="level-row"><input type="checkbox" id="lv-jlpt_n4" /> <span>N4(初级)</span></label>
          <label class="level-row"><input type="checkbox" id="lv-jlpt_n3" /> <span>N3(中级)</span></label>
          <label class="level-row"><input type="checkbox" id="lv-jlpt_n2" /> <span>N2(中高级)</span></label>
          <label class="level-row"><input type="checkbox" id="lv-jlpt_n1" /> <span>N1(高级)</span></label>
        </div>

        <div class="setting-title">每屏替换密度</div>
        <div class="density-row">
          <input type="range" id="density" min="1" max="10" step="1" value="4" />
          <span class="density-value"><span id="density-num">4</span> 个 / 屏</span>
        </div>
        <div class="density-hint">数字越小越安静。建议 3～5 个,想沉浸背单词可以调高。</div>

        <div class="setting-hint">改动后刷新网页生效。标记「认识了」的词会自动不再替换。</div>
      </section>

      <section class="popup-counters">
        <div class="counter-card">
          <div class="counter-label">已掌握</div>
          <div class="counter-value" id="count-mastered">0</div>
        </div>
        <div class="counter-card">
          <div class="counter-label">在学</div>
          <div class="counter-value" id="count-learning">0</div>
        </div>
        <div class="counter-card">
          <div class="counter-label">待复习</div>
          <div class="counter-value" id="count-review">0</div>
        </div>
      </section>

      <section class="popup-chart">
        <div class="chart-header">
          <span>7 天学习趋势</span>
        </div>
        <div class="chart-bars" id="chart-bars"></div>
        <div class="chart-legend">
          <span class="legend-item legend-learned">学习</span>
          <span class="legend-item legend-reviewed">复习</span>
          <span class="legend-item legend-failed">遗忘</span>
        </div>
      </section>
      <div class="popup-footer">
        <a href="#" id="open-options">⚙️ 黑名单 / 导出 / 更多设置</a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
