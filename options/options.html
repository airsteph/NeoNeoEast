<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>NeoNeoEast 设置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="opt-root">
      <h1>NeoNeo<span class="brand-accent">East</span> Settings</h1>

      <!-- 黑名单 -->
      <section class="opt-card">
        <h2>黑名单网站</h2>
        <p class="opt-hint">在这些网站上，插件完全不替换任何词。填域名即可，例如 <code>mail.google.com</code> 或 <code>github.com</code>（子域名自动包含）。</p>
        <div class="bl-add">
          <input type="text" id="bl-input" placeholder="输入域名，如 example.com" />
          <button id="bl-add-btn">添加</button>
        </div>
        <ul id="bl-list" class="bl-list"></ul>
        <div class="opt-hint">改动后刷新对应网页生效。</div>
      </section>

      <!-- 复习节奏 -->
      <section class="opt-card">
        <h2>复习节奏（减负设置）</h2>
        <div class="opt-row">
          <label>每天最多复习</label>
          <input type="number" id="cap-input" min="5" max="200" step="5" />
          <span>个</span>
        </div>
        <div class="opt-row">
          <label>每批推送</label>
          <input type="number" id="batch-input" min="1" max="50" step="1" />
          <span>个</span>
        </div>
        <p class="opt-hint">到期的词超过每日上限时，多出来的会自动顺延到明天，不会扣分、不算遗忘。图标上的小红点显示今天还需复习几个。</p>
        <button id="save-review" class="primary">保存复习设置</button>
        <span id="save-tip" class="save-tip"></span>
      </section>

      <!-- 导出 / 导入 -->
      <section class="opt-card">
        <h2>导出 / 导入</h2>
        <p class="opt-hint">换电脑或备份时用。导出的 CSV 可用 Excel 打开；备份文件（.json）可在新设备「导入」后完整恢复所有学习记录。</p>
        <div class="export-grid">
          <button id="exp-all">导出全部 (CSV)</button>
          <button id="exp-mastered">仅已掌握 (CSV)</button>
          <button id="exp-learning">仅在学 (CSV)</button>
          <button id="exp-review">仅待复习 (CSV)</button>
        </div>
        <div class="backup-row">
          <button id="exp-backup" class="primary">导出完整备份 (.json)</button>
          <label class="import-label">
            导入备份
            <input type="file" id="imp-file" accept=".json" hidden />
          </label>
        </div>
        <span id="io-tip" class="save-tip"></span>
      </section>

      <!-- 数据概览 -->
      <section class="opt-card">
        <h2>数据概览</h2>
        <div id="overview" class="overview">加载中…</div>
      </section>
    </div>
    <script src="options.js"></script>
  </body>
</html>
